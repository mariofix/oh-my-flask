version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    allow:
      - dependency-type: "all"
    assignees:
      - "mariofix"
    commit-message:
      prefix: "packages"
      prefix-development: "dev packages"
      include: "scope"
    groups:
      python-deps:
        patterns:
          - "*"

